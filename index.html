<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1020">
  <meta name="description" content="日々の修業と報酬をゲーム感覚で記録するライフログ">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="人生RPG">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <title>人生RPG</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090d18;
      --surface: #11182a;
      --surface-2: #172137;
      --line: #26334e;
      --text: #f3f6ff;
      --muted: #9eabc4;
      --primary: #68e1b5;
      --primary-2: #35b88c;
      --gold: #f2c96d;
      --danger: #ff7d8d;
      --info: #77a9ff;
      --radius: 18px;
      --shadow: 0 14px 40px rgba(0, 0, 0, .28);
    }
    :root[data-theme="light"] {
      color-scheme: light; --bg:#eef2f8; --surface:#ffffff; --surface-2:#e8eef7; --line:#cbd5e5; --text:#152033; --muted:#64728a;
      --primary:#168b67; --primary-2:#0d7958; --gold:#a86b00; --danger:#c94356; --info:#2f6fd6; --shadow:0 12px 34px rgba(37,55,84,.13);
    }
    :root[data-theme="light"] body { background:radial-gradient(circle at 85% -10%,rgba(22,139,103,.09),transparent 36%),var(--bg); }
    :root[data-theme="light"] .topbar { background:rgba(238,242,248,.9); }
    :root[data-theme="light"] .bottom-nav { background:rgba(248,250,253,.96); }
    :root[data-theme="light"] .card { background:linear-gradient(160deg,#fff,#f5f8fc); }
    :root[data-theme="light"] input, :root[data-theme="light"] select, :root[data-theme="light"] textarea, :root[data-theme="light"] .segmented { background:#fff; }
    :root[data-theme="light"] .modal { background:#f7f9fc; }
    :root[data-theme="light"] .modal-head { background:rgba(247,249,252,.96); }
    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100dvh;
      background:
        radial-gradient(circle at 85% -10%, rgba(104, 225, 181, .12), transparent 36%),
        radial-gradient(circle at -20% 25%, rgba(119, 169, 255, .10), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    button, input, select, textarea { font: inherit; }
    button { touch-action: manipulation; }
    .app-shell { width: min(100%, 760px); margin: 0 auto; min-height: 100dvh; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: calc(14px + env(safe-area-inset-top)) 18px 12px;
      background: rgba(9, 13, 24, .88);
      border-bottom: 1px solid rgba(38, 51, 78, .7);
      backdrop-filter: blur(16px);
    }
    .brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .brand-mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(145deg, var(--primary), #6db9ff);
      color: #07120f;
      font-size: 20px;
      box-shadow: 0 7px 24px rgba(104, 225, 181, .2);
    }
    .brand h1 { margin: 0; font-size: 17px; letter-spacing: .02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-size: 11px; }
    .top-balance { text-align: right; }
    .top-balance strong { display: block; color: var(--gold); font-size: 17px; font-variant-numeric: tabular-nums; }
    .top-balance span { color: var(--muted); font-size: 10px; }
    main { padding: 16px 16px calc(96px + env(safe-area-inset-bottom)); }
    .screen { display: none; animation: screen-in .18s ease; }
    .screen.active { display: block; }
    @keyframes screen-in { from { opacity: .45; transform: translateY(4px); } }
    .section-head { display: flex; align-items: end; justify-content: space-between; gap: 12px; margin: 4px 2px 12px; }
    .section-head h2, .section-head h3 { margin: 0; }
    .section-head h2 { font-size: 22px; }
    .section-head h3 { font-size: 16px; }
    .eyebrow { margin: 0 0 3px; color: var(--primary); font-weight: 700; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .tiny { font-size: 10px; }
    .stack { display: grid; gap: 12px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(160deg, rgba(23, 33, 55, .96), rgba(15, 22, 38, .96));
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-body { padding: 16px; }
    .hero { position: relative; padding: 20px; }
    .hero::after {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      right: -70px;
      top: -80px;
      border-radius: 50%;
      border: 28px solid rgba(104, 225, 181, .06);
    }
    .level-row { display: flex; align-items: center; justify-content: space-between; gap: 18px; position: relative; z-index: 1; }
    .level-badge { display: flex; align-items: baseline; gap: 6px; }
    .level-badge span { color: var(--muted); font-size: 13px; font-weight: 700; }
    .level-badge strong { font-size: 42px; line-height: 1; color: var(--primary); }
    .point-balance { text-align: right; }
    .point-balance strong { display: block; font-size: 28px; color: var(--gold); font-variant-numeric: tabular-nums; }
    .point-balance span { color: var(--muted); font-size: 11px; }
    .progress { height: 9px; margin-top: 15px; background: #080d17; border: 1px solid #283651; border-radius: 999px; overflow: hidden; }
    .progress > i { display: block; height: 100%; background: linear-gradient(90deg, var(--primary-2), var(--primary)); border-radius: inherit; }
    .stat { min-height: 92px; padding: 14px; }
    .stat .label { color: var(--muted); font-size: 11px; }
    .stat strong { display: block; margin-top: 7px; font-size: 20px; font-variant-numeric: tabular-nums; }
    .stat .sub { display: block; margin-top: 3px; color: var(--muted); font-size: 10px; }
    .timer-card { border-color: rgba(104, 225, 181, .44); }
    .timer-card.is-paused { border-color: rgba(242, 201, 109, .5); }
    .timer-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .theme-chip { display: inline-flex; align-items: center; gap: 7px; min-width: 0; font-weight: 700; }
    .theme-dot { width: 10px; height: 10px; flex: 0 0 auto; border-radius: 50%; background: var(--chip, var(--primary)); box-shadow: 0 0 14px var(--chip, var(--primary)); }
    .timer-display { margin: 18px 0 4px; text-align: center; font-size: clamp(42px, 13vw, 62px); line-height: 1; letter-spacing: .04em; font-variant-numeric: tabular-nums; font-weight: 800; }
    .timer-sub { text-align: center; color: var(--muted); font-size: 12px; }
    .timer-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
    .timer-meta div { padding: 10px; border-radius: 12px; background: rgba(7, 12, 22, .55); }
    .timer-meta span { display: block; color: var(--muted); font-size: 10px; }
    .timer-meta strong { display: block; margin-top: 4px; font-size: 13px; }
    .button-row { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 14px; }
    .btn {
      min-height: 46px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--surface-2);
      color: var(--text);
      font-weight: 750;
      cursor: pointer;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn:focus-visible, .nav-btn:focus-visible, .icon-btn:focus-visible { outline: 3px solid rgba(119, 169, 255, .55); outline-offset: 2px; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn.primary { border-color: transparent; background: linear-gradient(145deg, var(--primary), #70d4ff); color: #06120f; }
    .btn.gold { border-color: transparent; background: linear-gradient(145deg, var(--gold), #ffad69); color: #211505; }
    .btn.danger { border-color: rgba(255, 125, 141, .38); background: rgba(255, 125, 141, .10); color: #ffacb7; }
    .btn.ghost { background: transparent; }
    .btn.small-btn { min-height: 38px; padding: 0 12px; font-size: 12px; }
    .btn.block { width: 100%; }
    .quick-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px; }
    .quick-btn { min-height: 74px; text-align: left; }
    .quick-btn b { display: block; margin-bottom: 5px; font-size: 19px; }
    .list { display: grid; gap: 9px; }
    .list-item { display: flex; align-items: center; gap: 11px; padding: 13px; border: 1px solid var(--line); border-radius: 15px; background: rgba(17, 24, 42, .78); }
    .list-icon { display: grid; place-items: center; width: 42px; height: 42px; flex: 0 0 auto; border-radius: 13px; background: color-mix(in srgb, var(--item-color, var(--primary)) 18%, transparent); font-size: 20px; }
    .list-main { min-width: 0; flex: 1; }
    .list-main strong { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-main span { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; }
    .list-value { text-align: right; flex: 0 0 auto; }
    .list-value strong { color: var(--gold); font-variant-numeric: tabular-nums; }
    .icon-btn { width: 42px; height: 42px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface-2); color: var(--text); cursor: pointer; }
    .reward-actions { margin-top: 0; justify-content: flex-end; flex: 0 0 auto; }
    .empty { padding: 24px 16px; border: 1px dashed var(--line); border-radius: 15px; text-align: center; color: var(--muted); }
    .callout { padding: 13px 14px; border: 1px solid rgba(119, 169, 255, .34); border-radius: 14px; background: rgba(119, 169, 255, .08); color: #c9dcff; font-size: 12px; line-height: 1.65; }
    .coming { padding: 32px 20px; text-align: center; color: var(--muted); }
    .coming b { display: block; margin-bottom: 8px; color: var(--text); font-size: 18px; }
    .bottom-nav {
      position: fixed;
      z-index: 40;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      width: min(100%, 760px);
      padding: 7px 5px calc(7px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(10, 15, 27, .96);
      backdrop-filter: blur(18px);
    }
    .nav-btn { min-height: 54px; border: 0; border-radius: 12px; background: transparent; color: var(--muted); cursor: pointer; font-size: 10px; font-weight: 700; }
    .nav-btn b { display: block; margin-bottom: 3px; font-size: 19px; line-height: 1; }
    .nav-btn.active { background: rgba(104, 225, 181, .10); color: var(--primary); }
    .modal-backdrop { position: fixed; inset: 0; z-index: 100; display: none; align-items: flex-end; justify-content: center; padding-top: 20px; background: rgba(2, 5, 12, .72); backdrop-filter: blur(5px); }
    .modal-backdrop.open { display: flex; }
    .modal { width: min(100%, 760px); max-height: 92dvh; overflow: auto; border: 1px solid var(--line); border-bottom: 0; border-radius: 24px 24px 0 0; background: #101729; box-shadow: 0 -25px 70px rgba(0,0,0,.5); }
    .modal-head { position: sticky; top: 0; z-index: 2; display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--line); background: rgba(16, 23, 41, .96); }
    .modal-head h3 { margin: 0; font-size: 18px; }
    .modal-body { padding: 18px 18px calc(22px + env(safe-area-inset-bottom)); }
    .form-grid { display: grid; gap: 13px; }
    label { display: grid; gap: 7px; color: var(--muted); font-size: 12px; font-weight: 700; }
    input, select, textarea { width: 100%; min-height: 48px; border: 1px solid var(--line); border-radius: 12px; background: #0a1020; color: var(--text); padding: 11px 12px; outline: none; }
    input[type="color"] { padding: 5px; }
    input[type="checkbox"] { width: 22px; min-height: 22px; accent-color: var(--primary); }
    input:focus, select:focus, textarea:focus { border-color: var(--info); box-shadow: 0 0 0 3px rgba(119,169,255,.12); }
    textarea { min-height: 86px; resize: vertical; }
    .check-row { display: flex; align-items: center; gap: 10px; min-height: 44px; }
    .form-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .segmented { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 5px; border: 1px solid var(--line); border-radius: 14px; background: #0a1020; }
    .segmented button { min-height: 40px; border: 0; border-radius: 10px; background: transparent; color: var(--muted); font-weight: 700; }
    .segmented button.active { background: var(--surface-2); color: var(--text); }
    .bar-chart { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); align-items: end; gap: 7px; min-height: 174px; padding-top: 16px; }
    .bar-column { display: grid; grid-template-rows: 118px auto; gap: 7px; text-align: center; }
    .bar-track { display: flex; align-items: end; justify-content: center; height: 118px; border-bottom: 1px solid var(--line); }
    .bar { width: min(70%,28px); min-height: 3px; border-radius: 7px 7px 3px 3px; background: linear-gradient(180deg,var(--primary),var(--info)); box-shadow: 0 0 18px rgba(104,225,181,.15); }
    .bar-label { color: var(--muted); font-size: 10px; }
    .table-list { display: grid; gap: 8px; }
    .table-row { display: grid; grid-template-columns: minmax(0,1.4fr) repeat(2,minmax(62px,.7fr)); gap: 8px; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(38,51,78,.65); font-size: 12px; }
    .table-row:last-child { border-bottom: 0; }
    .table-row > :not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
    .toast { position: fixed; z-index: 200; left: 50%; bottom: calc(82px + env(safe-area-inset-bottom)); transform: translate(-50%, 18px); width: min(calc(100% - 32px), 520px); padding: 13px 15px; border: 1px solid var(--line); border-radius: 13px; background: #19233a; color: var(--text); opacity: 0; pointer-events: none; transition: .2s ease; box-shadow: var(--shadow); font-size: 13px; }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .pwa-update { position: fixed; z-index: 80; left: 50%; bottom: calc(82px + env(safe-area-inset-bottom)); transform: translateX(-50%); display: flex; align-items: center; justify-content: space-between; gap: 12px; width: min(calc(100% - 24px), 620px); padding: 12px 13px 12px 15px; border: 1px solid rgba(104,225,181,.5); border-radius: 15px; background: var(--surface); box-shadow: var(--shadow); }
    .pwa-update[hidden] { display: none; }
    .pwa-update span { min-width: 0; font-size: 12px; line-height: 1.5; }
    .reward-limit-alert { position: fixed; inset: 0; z-index: 320; display: grid; place-items: center; padding: 20px; background: rgba(2,5,12,.82); backdrop-filter: blur(8px); }
    .reward-limit-alert[hidden] { display: none; }
    .reward-limit-panel { width: min(100%,460px); padding: 24px; border: 1px solid rgba(242,201,109,.68); border-radius: 24px; background: var(--surface); box-shadow: 0 24px 80px rgba(0,0,0,.58); text-align: center; }
    .reward-limit-icon { display: grid; place-items: center; width: 72px; height: 72px; margin: 0 auto 14px; border-radius: 22px; background: rgba(242,201,109,.15); color: var(--gold); font-size: 36px; animation: alarm-pulse .8s ease-in-out infinite alternate; }
    .reward-limit-panel h2 { margin: 0; color: var(--gold); font-size: 24px; }
    .reward-limit-panel p { margin: 10px 0 0; color: var(--muted); line-height: 1.7; }
    @keyframes alarm-pulse { to { transform: scale(1.08); box-shadow: 0 0 30px rgba(242,201,109,.24); } }
    @media (min-width: 640px) {
      main { padding-left: 24px; padding-right: 24px; }
      .modal-backdrop { align-items: center; padding: 24px; }
      .modal { max-width: 620px; border-bottom: 1px solid var(--line); border-radius: 24px; }
    }
    @media (max-width: 370px) {
      .grid-2, .form-columns { grid-template-columns: 1fr; }
      .nav-btn { font-size: 9px; }
      .nav-btn b { font-size: 17px; }
    }
    @media (max-width: 560px) {
      .reward-choice-item { flex-wrap: wrap; align-items: flex-start; }
      .reward-choice-item .reward-actions { width: 100%; padding-left: 53px; }
      .reward-choice-item .reward-actions .btn { flex: 1 1 100px; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { scroll-behavior: auto !important; animation: none !important; transition: none !important; } }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">◆</div>
        <div><h1 id="app-title">人生RPG</h1><p>今日の経験を、明日の力に。</p></div>
      </div>
      <div class="top-balance"><strong id="top-points">0 pt</strong><span>報酬ポイント</span></div>
    </header>

    <main>
      <section id="screen-home" class="screen active" aria-labelledby="home-title">
        <div class="section-head"><div><p class="eyebrow">STATUS</p><h2 id="home-title">冒険者ステータス</h2></div></div>
        <div id="home-content" class="stack"></div>
      </section>

      <section id="screen-training" class="screen" aria-labelledby="training-title">
        <div class="section-head"><div><p class="eyebrow">TRAINING</p><h2 id="training-title">修業</h2></div><button class="btn small-btn primary" data-action="open-training-manual">手動記録</button></div>
        <div id="training-content" class="stack"></div>
      </section>

      <section id="screen-rewards" class="screen" aria-labelledby="rewards-title">
        <div class="section-head"><div><p class="eyebrow">REWARDS</p><h2 id="rewards-title">報酬</h2></div><button class="btn small-btn primary" data-action="add-reward">報酬を追加</button></div>
        <div id="rewards-content" class="stack"></div>
      </section>

      <section id="screen-stats" class="screen" aria-labelledby="stats-title">
        <div class="section-head"><div><p class="eyebrow">RECORDS</p><h2 id="stats-title">統計</h2></div></div>
        <div id="stats-content" class="stack"></div>
      </section>

      <section id="screen-history" class="screen" aria-labelledby="history-title">
        <div class="section-head"><div><p class="eyebrow">LOG</p><h2 id="history-title">履歴</h2></div></div>
        <div id="history-content" class="stack"></div>
      </section>

      <section id="screen-settings" class="screen" aria-labelledby="settings-title">
        <div class="section-head"><div><p class="eyebrow">SYSTEM</p><h2 id="settings-title">設定</h2></div><button class="btn small-btn primary" data-action="add-theme">修業を追加</button></div>
        <div id="settings-content" class="stack"></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="メインメニュー">
      <button class="nav-btn active" data-screen="home"><b>⌂</b>ホーム</button>
      <button class="nav-btn" data-screen="training"><b>⚔</b>修業</button>
      <button class="nav-btn" data-screen="rewards"><b>♢</b>報酬</button>
      <button class="nav-btn" data-screen="stats"><b>▥</b>統計</button>
      <button class="nav-btn" data-screen="history"><b>☷</b>履歴</button>
      <button class="nav-btn" data-screen="settings"><b>⚙</b>設定</button>
    </nav>
  </div>

  <div id="modal-backdrop" class="modal-backdrop" role="presentation">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <header class="modal-head"><h3 id="modal-title">入力</h3><button class="icon-btn" type="button" data-action="close-modal" aria-label="閉じる">×</button></header>
      <div id="modal-body" class="modal-body"></div>
    </section>
  </div>
  <div id="pwa-update" class="pwa-update" role="status" hidden>
    <span>新しいバージョンを利用できます。</span>
    <button class="btn small-btn primary" type="button" data-action="apply-pwa-update">更新する</button>
  </div>
  <div id="reward-limit-alert" class="reward-limit-alert" role="alertdialog" aria-modal="true" aria-labelledby="reward-limit-title" hidden>
    <div class="reward-limit-panel">
      <div class="reward-limit-icon" aria-hidden="true">⏰</div>
      <h2 id="reward-limit-title">報酬タイマー終了</h2>
      <p><strong id="reward-limit-name">報酬</strong>の使用可能時間が0になりました。</p>
      <div class="button-row" style="justify-content:center;margin-top:20px">
        <button class="btn primary" type="button" data-action="stop-reward-alarm">通知を停止</button>
        <button class="btn gold" type="button" data-action="stop-and-finish-reward">停止して精算</button>
      </div>
    </div>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
  (() => {
    'use strict';

    const STORAGE_KEY = 'jinseiRpgState';
    const SCHEMA_VERSION = 8;

    const uid = (prefix = 'id') => {
      const random = globalThis.crypto && crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      return `${prefix}-${random}`;
    };
    const isoNow = () => new Date().toISOString();
    const clamp = (number, min, max) => Math.min(max, Math.max(min, number));
    const num = (value, fallback = 0) => Number.isFinite(Number(value)) ? Number(value) : fallback;

    function renderStats() {
      const range=rangeForPeriod(statsPeriod);const trainingEntries=entriesInRange(state.trainingHistory,range);const rewardEntries=entriesInRange(state.rewardHistory,range);
      const totals=trainingTotals(trainingEntries);const points=pointSummary();const calories=calorieSummary();const streak=streakSummary();
      const usedPoints=rewardEntries.reduce((sum,entry)=>sum+num(entry.usedPoints),0);
      const periodCalories=trainingEntries.reduce((sum,entry)=>sum+num(entry.activeCalories),0)+entriesInRange(state.calorieHistory,range).reduce((sum,entry)=>sum+Math.max(0,num(entry.amount)),0);
      const themeMap=new Map();
      for(const entry of trainingEntries){const item=themeMap.get(entry.themeId)||{name:entry.themeName,seconds:0,count:0,points:0,last:null};item.seconds+=num(entry.durationSeconds);item.count++;item.points+=num(entry.earnedPoints);if(!item.last||new Date(entry.endAt)>new Date(item.last))item.last=entry.endAt;themeMap.set(entry.themeId,item);}
      const rewardMap=new Map();
      for(const entry of rewardEntries){const item=rewardMap.get(entry.rewardId)||{name:entry.rewardName,seconds:0,count:0,points:0};item.seconds+=num(entry.durationSeconds);item.count++;item.points+=num(entry.usedPoints);rewardMap.set(entry.rewardId,item);}
      const days=[];const today=todayRange()[0];
      for(let offset=6;offset>=0;offset--){const start=today-offset*86400000;const end=start+86400000;const entries=entriesInRange(state.trainingHistory,[start,end]);const summary=trainingTotals(entries);days.push({date:new Date(start),...summary});}

    function render() {
      renderHeader();
      renderHome();
      renderTraining();
      renderRewards();
      renderStats();
      renderHistory();
      renderSettings();
      syncRewardLimitAlarm();
    }

    function liveTick() {
      const timer = state.activeTrainingTimer;
      if (timer) {
        const elapsed = activeTrainingElapsedMs(timer) / 1000;
        const points = calculateTrainingPoints(elapsed, timer.snapshot);
        const base = elapsed % Math.max(1, timer.snapshot.secondsPerPoint);
        const next = base === 0 && elapsed > 0 ? 0 : Math.max(0, timer.snapshot.secondsPerPoint - base);
        document.querySelectorAll('[data-live-training-time]').forEach(el => el.textContent = formatDuration(elapsed));
        document.querySelectorAll('[data-live-training-points]').forEach(el => el.textContent = `${formatPoints(points)} pt`);
        document.querySelectorAll('[data-live-training-next]').forEach(el => el.textContent = formatDuration(next));
      }
      const rewardTimer = state.activeRewardTimer;
      if (rewardTimer) {
        const raw = activeRewardRawElapsedMs(rewardTimer);
        const affordable = rewardAffordableMs(rewardTimer);
        if (rewardTimer.status === 'running' && raw >= affordable) {
          rewardTimer.accumulatedMs = Math.max(0, affordable);
          rewardTimer.status = 'limit'; rewardTimer.pausedAt = isoNow(); rewardTimer.limitReachedAt=isoNow(); rewardTimer.rewardAlarmDismissedAt=null; saveState(); render();
        }
        const elapsed = activeRewardElapsedMs(rewardTimer) / 1000;
        const used = calculateRewardPointCost(elapsed, rewardTimer.snapshot);
        const balance = pointSummary().balance;
        document.querySelectorAll('[data-live-reward-time]').forEach(el=>el.textContent=formatDuration(elapsed));
        document.querySelectorAll('[data-live-reward-cost]').forEach(el=>el.textContent=`${formatPoints(used)} pt`);
        document.querySelectorAll('[data-live-reward-after]').forEach(el=>el.textContent=`${formatPoints(Math.max(0,balance-used))} pt`);
        document.querySelectorAll('[data-live-reward-affordable]').forEach(el=>el.textContent=Number.isFinite(affordable)?formatDuration(affordable/1000):'無制限');
      }
      if(state.activeWaitTimer){
        if(completeWaitIfNeeded())render();
        const remaining=waitTimerRemainingMs();
        document.querySelectorAll('[data-live-wait]').forEach(el=>el.textContent=remaining<=0?state.activeWaitTimer.completeLabel:waitDurationLabel(remaining));
      }
    }

    function startTraining() {
      if (state.activeTrainingTimer) return showToast('すでに修業タイマーが進行中です。');
      const select = document.getElementById('training-theme-select');
      const theme = getTheme(select?.value || state.trainingThemes.find(t=>t.enabled)?.id);
      if (!theme) return showToast('有効な修業テーマがありません。');
      const now = isoNow();
      state.activeTrainingTimer = {sessionId:uid('training-session'), status:'running', startedAt:now, lastStartedAt:now, pausedAt:null, accumulatedMs:0, snapshot:trainingSnapshot(theme), createdAt:now};
      saveState(); render(); showToast(`${theme.name}の修業を開始しました。`);
    }
    function pauseTraining() {
      const timer = state.activeTrainingTimer;
      if (!timer || timer.status !== 'running') return;
      timer.accumulatedMs = activeTrainingElapsedMs(timer);
      timer.pausedAt = isoNow(); timer.status = 'paused'; saveState(); render();
    }
    function resumeTraining() {
      const timer = state.activeTrainingTimer;
      if (!timer || timer.status !== 'paused') return;
      timer.lastStartedAt = isoNow(); timer.pausedAt = null; timer.status = 'running'; saveState(); render();
    }
    function cancelTraining() {
      if (!state.activeTrainingTimer || !confirmAction('進行中の修業を記録せずにキャンセルしますか？')) return;
      state.activeTrainingTimer = null; saveState(); render(); showToast('修業タイマーをキャンセルしました。');
    }
    function openFinishTraining() {
      const timer = state.activeTrainingTimer;
      if (!timer || finishing) return;
      const durationSeconds = Math.max(1, Math.floor(activeTrainingElapsedMs(timer) / 1000));
      const points = calculateTrainingPoints(durationSeconds, timer.snapshot);
      finishing = true;
      openModal('修業を記録', `
        <form id="finish-training-form" class="form-grid">
          <div class="callout">開始時点の換算率（${formatLongDuration(timer.snapshot.secondsPerPoint)}で1pt、×${timer.snapshot.multiplier}、固定＋${timer.snapshot.fixedBonus}）を使用します。</div>
          <label>修業テーマ<select name="themeId">${state.trainingThemes.map(theme=>`<option value="${esc(theme.id)}" ${theme.id===timer.snapshot.themeId?'selected':''}>${esc(theme.icon)} ${esc(theme.name)}</option>`).join('')}</select></label>
          <div class="form-columns"><label>実施時間（分）<input name="durationMinutes" type="number" inputmode="decimal" min="0.01" step="0.01" value="${(durationSeconds/60).toFixed(2)}" required></label><label>獲得ポイント<input name="earnedPoints" type="number" inputmode="decimal" step="any" value="${points}" required></label></div>
          <label>記録日時<input name="recordedAt" type="datetime-local" value="${localDateTimeValue()}" required></label>
          ${timer.snapshot.isExercise ? '<label>アクティブカロリー（任意）<input name="activeCalories" type="number" inputmode="decimal" min="0" step="1" value="0"></label>' : '<input name="activeCalories" type="hidden" value="0">'}
          <label>メモ<textarea name="memo" placeholder="今日の気づきや成果"></textarea></label>
          <button class="btn primary block" type="submit">この内容で保存</button>
        </form>`);
    }
    function submitFinishTraining(form) {
      if (!state.activeTrainingTimer) return closeModal();
      const timer = state.activeTrainingTimer;
      if (state.trainingHistory.some(entry => entry.sourceSessionId === timer.sessionId)) { state.activeTrainingTimer = null; saveState(); closeModal(); render(); return showToast('この修業はすでに記録済みです。'); }
      const data = new FormData(form);
      const selectedTheme = getTheme(data.get('themeId')) || getTheme(timer.snapshot.themeId);
      const durationSeconds = Math.max(1, num(data.get('durationMinutes')) * 60);
      const endAt = new Date(data.get('recordedAt')).toISOString();
      const startAt = new Date(new Date(endAt).getTime() - durationSeconds * 1000).toISOString();
      commitTrainingHistoryEntry({
        id:uid('training'), sourceSessionId:timer.sessionId, themeId:selectedTheme?.id || timer.snapshot.themeId,
        themeName:selectedTheme?.name || timer.snapshot.themeName, themeIcon:selectedTheme?.icon || timer.snapshot.themeIcon, themeColor:selectedTheme?.color || timer.snapshot.themeColor,
        startAt, endAt, durationSeconds, earnedPoints:num(data.get('earnedPoints')), secondsPerPoint:timer.snapshot.secondsPerPoint,
        multiplier:timer.snapshot.multiplier, fixedBonus:timer.snapshot.fixedBonus, activeCalories:Math.max(0,num(data.get('activeCalories'))),
        memo:String(data.get('memo') || ''), inputMethod:'timer', createdAt:isoNow(), updatedAt:isoNow()
      });
      state.activeTrainingTimer = null;
      saveState(); closeModal(); render(); showToast('修業を記録し、ポイントを獲得しました。');
    }

    function startReward() {
      if (state.activeRewardTimer) return showToast('すでに報酬タイマーが進行中です。');
      const reward = getReward(document.getElementById('reward-timer-select')?.value);
      if (!reward) return showToast('時間報酬を選択してください。');
      if (!(reward.pointCostPerMinute > 0)) return showToast('1分あたりの必要ポイントを設定してください。');
      if (!(pointSummary().balance > 0)) return showToast('使用できるポイントがありません。');
      stopRewardLimitAlarm(false);ensureRewardAlarmAudio();
      const now = isoNow();
      state.activeRewardTimer = {sessionId:uid('reward-session'),status:'running',startedAt:now,lastStartedAt:now,pausedAt:null,accumulatedMs:0,limitReachedAt:null,rewardAlarmDismissedAt:null,snapshot:rewardSnapshot(reward),createdAt:now};
      saveState(); render(); showToast(`${reward.name}の報酬タイマーを開始しました。`);
    }
    function pauseReward() {
      const timer=state.activeRewardTimer;
      if (!timer || timer.status!=='running') return;
      timer.accumulatedMs=activeRewardElapsedMs(timer); timer.pausedAt=isoNow(); timer.status='paused'; saveState(); render();
    }
    function resumeReward() {
      const timer=state.activeRewardTimer;
      if (!timer || timer.status!=='paused') return;
      if (!(pointSummary().balance>0)) return showToast('使用できるポイントがありません。');
      timer.lastStartedAt=isoNow(); timer.pausedAt=null; timer.status='running'; saveState(); render();
    }
    function cancelReward() {
      if (!state.activeRewardTimer || !confirmAction('報酬タイマーをポイント消費なしでキャンセルしますか？')) return;
      stopRewardLimitAlarm(false);state.activeRewardTimer=null; saveState(); render(); showToast('報酬タイマーをキャンセルしました。');
    }
    function openFinishReward() {
      const timer=state.activeRewardTimer;
      if (!timer || finishing) return;
      const durationSeconds=Math.max(0,activeRewardElapsedMs(timer)/1000);
      const cost=Math.min(pointSummary().balance,calculateRewardPointCost(durationSeconds,timer.snapshot));
      finishing=true;
      openModal('報酬タイマーを精算',`<form id="finish-reward-form" class="form-grid">
        <div class="callout">${esc(timer.snapshot.rewardName)}を${formatLongDuration(durationSeconds)}使用しました。実際の経過時間分だけポイントを消費します。</div>
        <div class="form-columns"><label>使用時間（分）<input name="durationMinutes" type="number" min="0" step="0.01" value="${(durationSeconds/60).toFixed(2)}" required></label><label>使用ポイント<input name="usedPoints" type="number" min="0" step="any" value="${cost}" required></label></div>
        <label>メモ<textarea name="memo"></textarea></label>
        <button class="btn gold block" type="submit">精算して終了</button>
      </form>`);
    }
    function submitFinishReward(form) {
      const timer=state.activeRewardTimer;
      if (!timer) return closeModal();
      if (state.rewardHistory.some(entry=>entry.sourceSessionId===timer.sessionId)) {state.activeRewardTimer=null;saveState();closeModal();render();return showToast('この報酬はすでに精算済みです。');}
      const data=new FormData(form);
      const balance=pointSummary().balance;
      const usedPoints=Math.max(0,num(data.get('usedPoints')));
      if (usedPoints>balance+1e-9) return showToast('ポイント残高を超えて消費できません。');
      const durationSeconds=Math.max(0,num(data.get('durationMinutes'))*60);
      const endAt=isoNow();
      commitRewardHistoryEntry({
        id:uid('reward'),sourceSessionId:timer.sessionId,rewardId:timer.snapshot.rewardId,rewardName:timer.snapshot.rewardName,rewardIcon:timer.snapshot.rewardIcon,rewardColor:timer.snapshot.rewardColor,
        rewardType:'point_time',startAt:timer.startedAt,endAt,durationSeconds,usedPoints,usedCalories:0,
        pointCostPerMinute:timer.snapshot.pointCostPerMinute,balanceAfter:balance-usedPoints,calorieBalanceAfter:null,memo:String(data.get('memo')||''),createdAt:isoNow(),updatedAt:isoNow()
      });
      stopRewardLimitAlarm(false);state.activeRewardTimer=null;saveState();closeModal();render();showToast('報酬を精算し、ポイントを消費しました。');
    }
    function useFixedReward(id,button) {
      const reward=getReward(id);
      if (!reward || !['point_fixed','free','other'].includes(reward.type)) return;
      if(button)button.disabled=true;
      const balance=pointSummary().balance;
      const cost=reward.type==='free'?0:Math.max(0,num(reward.fixedPointCost));
      if (balance+1e-9<cost) {if(button)button.disabled=false;return showToast('ポイントが不足しています。');}
      if (!confirmAction(`「${reward.name}」を${formatPoints(cost)}ポイントで使用しますか？`)) {if(button)button.disabled=false;return;}
      commitRewardHistoryEntry({
        id:uid('reward'),sourceSessionId:uid('fixed-use'),rewardId:reward.id,rewardName:reward.name,rewardIcon:reward.icon,rewardColor:reward.color,rewardType:reward.type,
        startAt:null,endAt:isoNow(),durationSeconds:0,usedPoints:cost,usedCalories:0,fixedPointCost:cost,balanceAfter:balance-cost,calorieBalanceAfter:null,memo:'',createdAt:isoNow(),updatedAt:isoNow()
      });
      saveState();render();showToast(`${reward.name}を使用しました。`);

    function validateImport(raw) {
      if(!raw||typeof raw!=='object'||Array.isArray(raw))throw new Error('JSONの最上位はオブジェクトである必要があります。');
      for(const key of ['trainingThemes','rewards','trainingHistory','rewardHistory','cashUsageHistory','calorieHistory','waitHistory','pointAdjustments','achievements'])if(raw[key]!=null&&!Array.isArray(raw[key]))throw new Error(`${key} は配列である必要があります。`);
      return normalizeState(raw);
    }
    function mergeState(imported) {
      const next=structuredClone(state);const keys=['trainingThemes','rewards','trainingHistory','rewardHistory','cashUsageHistory','calorieHistory','waitHistory','pointAdjustments','achievements'];const duplicates=[];
      for(const key of keys){const ids=new Set(next[key].map(item=>item.id));for(const item of imported[key]){if(ids.has(item.id)){duplicates.push(`${key}: ${item.id}`);continue;}next[key].push(item);ids.add(item.id);}}
      if(!next.activeTrainingTimer&&imported.activeTrainingTimer)next.activeTrainingTimer=imported.activeTrainingTimer;else if(next.activeTrainingTimer&&imported.activeTrainingTimer)duplicates.push('進行中の修業タイマー');
      if(!next.activeRewardTimer&&imported.activeRewardTimer)next.activeRewardTimer=imported.activeRewardTimer;else if(next.activeRewardTimer&&imported.activeRewardTimer)duplicates.push('進行中の報酬タイマー');
      if(!next.activeWaitTimer&&imported.activeWaitTimer)next.activeWaitTimer=imported.activeWaitTimer;else if(next.activeWaitTimer&&imported.activeWaitTimer)duplicates.push('進行中の待機タイマー');
      return {next,duplicates};

        if(mode==='overwrite'){if(!globalThis.confirm('現在の全データをインポート内容で上書きしますか？'))return;state=imported;}
        else{const merged=mergeState(imported);if(merged.duplicates.length&&!globalThis.confirm(`重複IDまたは競合が${merged.duplicates.length}件あります。重複を除外して追加しますか？\n\n${merged.duplicates.slice(0,8).join('\n')}`))return;state=merged.next;}

    }
    async function registerPwa() {
      if (typeof navigator === 'undefined' || !('serviceWorker' in navigator)) return;
      if (globalThis.location?.protocol === 'file:') return;
      try {
        const registration = await navigator.serviceWorker.register('./sw.js', {scope:'./'});
        if (registration.waiting && navigator.serviceWorker.controller) showPwaUpdate(registration.waiting);
        registration.addEventListener('updatefound', () => {
          const installing = registration.installing;
          if (!installing) return;
          installing.addEventListener('statechange', () => {
            if (installing.state === 'installed' && navigator.serviceWorker.controller) showPwaUpdate(installing);
          });
        });
        window.addEventListener('focus', () => registration.update());
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          globalThis.location.reload();
        });
      } catch (error) {
        console.warn('PWAのオフライン機能を開始できませんでした。', error);
      }
    }

    document.addEventListener('click', event => {
      const navButton = event.target.closest('[data-screen]');
      if (navButton) return nav(navButton.dataset.screen);
      const button = event.target.closest('[data-action]');
      if (!button) return;
      const {action, id, mode, kind} = button.dataset;
      const actions = {
        'close-modal':closeModal, 'go-training':()=>nav('training'), 'go-rewards':()=>nav('rewards'), 'go-history':()=>nav('history'),
        'start-training':startTraining, 'pause-training':pauseTraining, 'resume-training':resumeTraining,
        'finish-training':openFinishTraining, 'cancel-training':cancelTraining, 'open-training-manual':openManualTraining,
        'manual-mode':()=>toggleManualMode(mode), 'add-theme':()=>openThemeForm(), 'edit-theme':()=>openThemeForm(id),
        'delete-theme':()=>deleteTheme(id), 'move-theme-up':()=>moveThemeUp(id),
        'start-reward':startReward,'pause-reward':pauseReward,'resume-reward':resumeReward,'finish-reward':openFinishReward,'cancel-reward':cancelReward,
        'stop-reward-alarm':()=>stopRewardLimitAlarm(true),'stop-and-finish-reward':stopAndFinishReward,
        'use-fixed-reward':()=>useFixedReward(id,button),'use-calorie-reward':()=>useCalorieReward(id,button,'item'),'cash-calorie-reward':()=>useCalorieReward(id,button,'cash'),'open-calorie-input':openCalorieInput,'open-cash-usage':openCashUsage,
        'add-reward':()=>openRewardForm(),'edit-reward':()=>openRewardForm(id),'delete-reward':()=>deleteReward(id),
        'start-wait':startWait,'reset-wait':resetWait,'cancel-wait':cancelWait,'edit-wait-settings':openWaitSettings,'edit-level-settings':openLevelSettings,
        'edit-history':()=>openHistoryEditor(kind,id),'delete-history':()=>deleteHistory(kind,id),'edit-display-settings':openDisplaySettings,
        'point-adjustment':openPointAdjustment,'export-data':openExportData,'copy-export':copyExport,'download-export':downloadExport,'import-data':openImportData,'reset-all-data':resetAllData,
        'apply-pwa-update':applyPwaUpdate
      };
      actions[action]?.();
    });

    document.addEventListener('change',event=>{
      if(event.target.matches('[data-action="reward-type-change"]'))toggleRewardType(event.target.value);
      if(event.target.id==='stats-period'){statsPeriod=event.target.value;renderStats();}
    });

    document.addEventListener('submit', event => {
      event.preventDefault();
      if (event.target.id === 'finish-training-form') submitFinishTraining(event.target);
      if (event.target.id === 'manual-training-form') submitManualTraining(event.target);
      if (event.target.id === 'confirm-manual-training-form') confirmManualTraining(event.target);
      if (event.target.id === 'theme-form') submitTheme(event.target);
      if (event.target.id === 'finish-reward-form') submitFinishReward(event.target);
      if (event.target.id === 'reward-form') submitReward(event.target);
      if (event.target.id === 'calorie-form') submitCalorie(event.target);
      if (event.target.id === 'cash-usage-form') submitCashUsage(event.target);
      if (event.target.id === 'wait-settings-form') submitWaitSettings(event.target);
      if (event.target.id === 'level-settings-form') submitLevelSettings(event.target);
      if (event.target.id === 'history-edit-form') saveHistoryEdit(event.target);
      if (event.target.id === 'display-settings-form') submitDisplaySettings(event.target);
      if (event.target.id === 'point-adjustment-form') submitPointAdjustment(event.target);
      if (event.target.id === 'import-form') submitImport(event.target);
    });
    document.getElementById('modal-backdrop').addEventListener('click', event => { if (event.target.id === 'modal-backdrop') closeModal(); });
    document.addEventListener('keydown', event => { if (event.key === 'Escape') closeModal(); });
    document.addEventListener('visibilitychange', () => { if (!document.hidden) { state = loadState(); render(); liveTick(); } });
    window.addEventListener('storage', event => { if (event.key === STORAGE_KEY) { state = loadState(); render(); } });
    setInterval(liveTick, 1000);

    window.__JINSEI_RPG__ = {
      getState: () => structuredClone(state),
      setState: next => { state = normalizeState(next); saveState(); render(); },
      reset: () => { state = createDefaultState(); saveState(); render(); },
      calculateTrainingPoints, pointSummary, activeTrainingElapsedMs, trainingTotals, commitTrainingHistoryEntry,
      calculateRewardPointCost, activeRewardRawElapsedMs, activeRewardElapsedMs, rewardAffordableMs, commitRewardHistoryEntry,
      shouldRewardLimitAlarm,
      calorieSummary, cashRewardSummary, commitCashUsageEntry,
      rangeForPeriod, streakSummary, peakCalorieBalance, achievementConditions, waitTimerRemainingMs,
      getLevel,
      formatLongDuration,
      validateImport, mergeState, exportedJson,
      storageKey: STORAGE_KEY, version: SCHEMA_VERSION
    };

    saveState();
    render();
    registerPwa();
  })();
  </script>
</body>
</html>
